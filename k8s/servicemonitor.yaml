apiVersion: v1
kind: Service
metadata:
  name: tictactoe-metrics
  namespace: tictactoe
  labels:
    app: tictactoe
    monitoring: prometheus
spec:
  selector:
    app: tictactoe
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tictactoe
  namespace: tictactoe
  labels:
    app: tictactoe
    release: prometheus
spec:
  selector:
    matchLabels:
      app: tictactoe
      monitoring: prometheus
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: http
  namespaceSelector:
    matchNames:
    - tictactoe
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tictactoe-alerts
  namespace: tictactoe
  labels:
    app: tictactoe
    release: prometheus
spec:
  groups:
  - name: tictactoe.rules
    interval: 30s
    rules:
    - alert: TicTacToeHighErrorRate
      expr: |
        sum(rate(tictactoe_http_requests_total{status=~"5.."}[5m])) 
        / sum(rate(tictactoe_http_requests_total[5m])) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High error rate in TicTacToe application"
        description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"
    - alert: TicTacToeHighLatency
      expr: |
        histogram_quantile(0.95, 
          sum(rate(tictactoe_http_request_duration_seconds_bucket[5m])) by (le)
        ) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High latency in TicTacToe application"
        description: "95th percentile latency is {{ $value }}s"
    - alert: TicTacToeNoActiveGames
      expr: tictactoe_active_games == 0
      for: 30m
      labels:
        severity: info
      annotations:
        summary: "No active games in TicTacToe"
        description: "There have been no active games for 30 minutes"
    - alert: TicTacToePodDown
      expr: up{job="tictactoe"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "TicTacToe pod is down"
        description: "TicTacToe pod {{ $labels.pod }} has been down for 2 minutes"